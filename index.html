    <!-- Single audio element for controlled playback -->
    <audio id="bgMusicPlayer" loop></audio>

    <script>
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            // Click anywhere to reveal page and play music (first time only)
            let revealed = false;
            const audio = document.getElementById('bgMusicPlayer');
            
            // Listen for clicks on any element
            const handleClick = function(e) {
                if (!revealed) {
                    // Fade out overlay
                    const overlay = document.getElementById('revealOverlay');
                    if (overlay) overlay.classList.add('hidden');
                    revealed = true;
                    
                    // Play music (loop enabled, 50% volume)
                    audio.loop = true;
                    audio.volume = 0.5;
                    audio.play().catch(e => console.log('Audio play blocked:', e));
                }
                
                // Remove temporary listener after first click so other elements don't trigger reveal
                document.removeEventListener('click', handleClick);
            };
            
            // Attach handler to body
            document.body.addEventListener('click', handleClick);
        });
        
        // Mouse parallax on orbs
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 20;
                const x = (window.innerWidth - e.pageX * speed) / 10000;
                const y = (window.innerHeight - e.pageY * speed) / 10000;
                orb.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
        
        // Particle network mouse interaction
        document.addEventListener('mousemove', (e) => {
            const particles = document.querySelectorAll('.particles');
            if (particles.length > 0) {
                const x = e.pageX * 0.1;
                const y = e.pageY * 0.1;
                particles[0].style.backgroundPosition = `${x}px ${y}px`;
            }
        });
    </script>
