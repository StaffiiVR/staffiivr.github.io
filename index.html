<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staffii • guns.lol</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0f0e11;
            --bg-elevated: #161418;
            --beige: #d4c4b4;
            --beige-light: #e8dccc;
            --text: #e2d9f0;
            --text-muted: #8a8199;
            --border: rgba(212, 196, 180, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 720px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .ambient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 196, 180, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 196, 180, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 128px;
            height: 128px;
            border-radius: 9999px;
            object-fit: cover;
            border: 3px solid var(--beige);
            box-shadow: 0 0 0 8px rgba(212, 196, 180, 0.1);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.03);
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: #22c55e;
            border: 3px solid var(--bg);
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.3);
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            margin-bottom: 0.25rem;
        }

        .handle {
            font-size: 1.1rem;
            color: var(--beige-light);
            font-weight: 500;
        }

        .bio {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card:hover {
            border-color: var(--beige);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-icon {
            width: 42px;
            height: 42px;
            background: rgba(212, 196, 180, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--beige);
            font-size: 1.25rem;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 9999px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link:hover {
            background: var(--beige);
            color: #0f0e11;
            border-color: var(--beige);
            transform: translateY(-1px);
        }

        .footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            .name {
                font-size: 2.4rem;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="avatar-wrapper">
                <img src="pfp.png" alt="Staffii" class="avatar">
                <div class="status-dot"></div>
            </div>
            <h1 class="name">Staffii</h1>
            <div class="handle">@staffiivr</div>
            <p class="bio">PC Master Race • VRChat Ghost Walker • Gym Beast</p>
        </div>

        <!-- Cards -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-vr-cardboard"></i></div>
                    <div class="card-title">VRChat</div>
                </div>
                <div class="card-desc">Ghost Walker avatar • Daily visitor • Screenshot hoarder</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-dumbbell"></i></div>
                    <div class="card-title">Gym</div>
                </div>
                <div class="card-desc">Push • Pull • Legs • Strength gains every week</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-microchip"></i></div>
                    <div class="card-title">Hardware</div>
                </div>
                <div class="card-desc">AMD RX 9070 XT • RDNA4 • 16GB VRAM</div>
            </div>
        </div>

        <!-- Social Links -->
        <div class="links">
            <a href="https://github.com/StaffiiVR" target="_blank" class="link">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>
            <a href="https://www.youtube.com/@StaffiiVR" target="_blank" class="link">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://twitter.com/StaffiiVR" target="_blank" class="link">
                <i class="fab fa-twitter"></i>
                <span>Twitter</span>
            </a>
            <a href="discord://412070130130878474" class="link">
                <i class="fab fa-discord"></i>
                <span>Discord</span>
            </a>
        </div>

        <div class="footer">
            Made with ❤️
        </div>
    </div>
</body>
</html>
